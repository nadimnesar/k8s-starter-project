apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-starter
  namespace: k8s-starter
  labels:
    app: k8s-starter
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-starter
  template:
    metadata:
      labels:
        app: k8s-starter
    spec:
      containers:
        - name: k8s-starter
          image: k8s-starter
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: k8s-starter-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
