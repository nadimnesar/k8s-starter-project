apiVersion: v1
kind: Service
metadata:
  name: k8s-starter-svc
  namespace: k8s-starter-dev
  labels:
    app: k8s-starter # This label is used to identify which application this Service belongs to.
    environment: development
spec:
  type: NodePort
  selector:
    app: k8s-starter # This label is used to identify the Pods this Service targets
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
