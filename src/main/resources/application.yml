server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /
  endpoint:
    health:
      probes:
        enabled: true

spring:
  mvc:
    apiversion:
      supported: 1.0, 2.0
      default: 1.0
      use:
        header: X-API-Version

  jackson:
    default-property-inclusion: non_null
